name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SSH_IP: ${{ secrets.SSH_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PATH: ${{ secrets.SSH_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key and known_hosts
        env:
          SSH_B64: ${{ secrets.SSH_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          SSH_KEY_FILE="$(mktemp)"
          printf '%s' "${SSH_B64}" | base64 --decode > "${SSH_KEY_FILE}"
          chmod 600 "${SSH_KEY_FILE}"
          echo "SSH_KEY_FILE=${SSH_KEY_FILE}" >> "$GITHUB_ENV"

          KNOWN_HOSTS_FILE="${HOME}/.ssh/known_hosts"
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          if [[ -n "${SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${SSH_KNOWN_HOSTS}" >> "${KNOWN_HOSTS_FILE}"
            echo "SSH_STRICT=yes" >> "$GITHUB_ENV"
          else
            echo "WARNING: SSH_KNOWN_HOSTS secret is not set; host key verification is disabled." >&2
            echo "SSH_STRICT=no" >> "$GITHUB_ENV"
          fi

      - name: Ensure destination directory exists
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            "mkdir -p '${SSH_PATH}'"

      - name: Check Docker version on remote
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          echo "=== docker version ==="
          docker version || echo "docker version failed"
          echo "=== docker info ==="
          docker info || echo "docker info failed"
          echo "=== compose availability ==="
          docker compose version 2>/dev/null \
            || docker-compose version 2>/dev/null \
            || echo "No compose available"
          REMOTE

      - name: Validate Docker prerequisites on remote
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          if ! command -v docker > /dev/null 2>&1; then
            echo "Docker is not installed on the remote host." >&2
            echo "Install Docker on the target server before running this deploy workflow." >&2
            exit 1
          fi

          if docker compose version > /dev/null 2>&1; then
            docker compose version
            exit 0
          fi

          if docker-compose version > /dev/null 2>&1; then
            docker-compose version
            exit 0
          fi

          echo "Docker Compose is not available on the remote host." >&2
          echo "Install either 'docker compose' or 'docker-compose' on the target server before deploy." >&2
          exit 1
          REMOTE

      - name: Inject secrets into configuration
        env:
          ADB_KEY: ${{ secrets.ADB_KEY }}
          TURN_KEY: ${{ secrets.TURN_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          adb_key = os.environ.get("ADB_KEY", "").strip()
          turn_key = os.environ.get("TURN_KEY", "").strip()

          if not adb_key:
              raise SystemExit("Error: ADB_KEY secret is not set")
          if not turn_key:
              raise SystemExit("Error: TURN_KEY secret is not set")

          # Capture the leading whitespace so the replacement works at any indentation level.
          # ADB_KEY must be the full PEM key including -----BEGIN/END PRIVATE KEY----- lines.
          def replace_adb_key(match):
              indent = match.group(1)
              return "\n".join(indent + line for line in adb_key.splitlines())

          for compose_path in ("docker-compose.yml",):
              if not os.path.exists(compose_path):
                  continue
              with open(compose_path, "r", encoding="utf-8") as fh:
                  content = fh.read()
              content = re.sub(r"^( *)PLACEHOLDER_ADB_KEY$", replace_adb_key, content, flags=re.MULTILINE)
              content = content.replace("PLACEHOLDER_TURN_KEY", turn_key)
              with open(compose_path, "w", encoding="utf-8") as fh:
                  fh.write(content)
          PYEOF

      - name: Upload repository files
        run: |
          rsync -az \
            --exclude='*.md' \
            --exclude='.git/' \
            -e "ssh -i ${SSH_KEY_FILE} -o StrictHostKeyChecking=${SSH_STRICT} -o BatchMode=yes" \
            ./ \
            "${SSH_USER}@${SSH_IP}:${SSH_PATH}/"

      - name: Build full docker compose stack
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            COMPOSE_DIR="${SSH_PATH}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          cd "${COMPOSE_DIR}"
          if docker compose version > /dev/null 2>&1; then
            docker compose build --no-cache
          else
            docker-compose build --no-cache
          fi
          echo "    docker compose builds complete."
          REMOTE

      - name: Launch full docker compose stack
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            COMPOSE_DIR="${SSH_PATH}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          cd "${COMPOSE_DIR}"
          if docker compose version > /dev/null 2>&1; then
            docker compose up -d --remove-orphans
          else
            docker-compose up -d --remove-orphans
          fi
          echo "    docker compose deploy complete."
          REMOTE

      - name: Verify deployed services
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            COMPOSE_DIR="${SSH_PATH}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          cd "${COMPOSE_DIR}"
          if docker compose version > /dev/null 2>&1; then
            docker compose ps
          else
            docker-compose ps
          fi
          REMOTE

      - name: Clean up SSH key
        if: always()
        run: shred -u "${SSH_KEY_FILE}" 2>/dev/null || rm -f "${SSH_KEY_FILE}"
