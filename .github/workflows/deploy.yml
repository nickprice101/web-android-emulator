name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SSH_IP: ${{ secrets.SSH_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PATH: ${{ secrets.SSH_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key and known_hosts
        env:
          SSH_B64: ${{ secrets.SSH_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          SSH_KEY_FILE="$(mktemp)"
          printf '%s' "${SSH_B64}" | base64 --decode > "${SSH_KEY_FILE}"
          chmod 600 "${SSH_KEY_FILE}"
          echo "SSH_KEY_FILE=${SSH_KEY_FILE}" >> "$GITHUB_ENV"

          KNOWN_HOSTS_FILE="${HOME}/.ssh/known_hosts"
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          if [[ -n "${SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${SSH_KNOWN_HOSTS}" >> "${KNOWN_HOSTS_FILE}"
            echo "SSH_STRICT=yes" >> "$GITHUB_ENV"
          else
            echo "WARNING: SSH_KNOWN_HOSTS secret is not set; host key verification is disabled." >&2
            echo "SSH_STRICT=no" >> "$GITHUB_ENV"
          fi

      - name: Ensure destination directory exists
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            "mkdir -p '${SSH_PATH}'"

      - name: Check Docker version on remote
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          echo "=== docker version ==="
          docker version || echo "docker version failed"
          echo "=== docker info ==="
          docker info || echo "docker info failed"
          echo "=== compose availability ==="
          docker compose version 2>/dev/null \
            || docker-compose version 2>/dev/null \
            || echo "No compose available"
          REMOTE

      - name: Install docker-compose if missing
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          if docker compose version > /dev/null 2>&1 || docker-compose version > /dev/null 2>&1; then
            echo "Docker Compose already available, skipping install."
            exit 0
          fi
          echo "Installing docker-compose standalone binary..."
          COMPOSE_VERSION="$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
            | grep '"tag_name"' | head -1 | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/')"
          ARCH="$(uname -m)"
          curl -fsSL \
            "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-${ARCH}" \
            -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose
          docker-compose version
          echo "docker-compose installed at /usr/local/bin/docker-compose"
          REMOTE

      - name: Inject secrets into configuration
        env:
          ADB_KEY: ${{ secrets.ADB_KEY }}
          TURN_KEY: ${{ secrets.TURN_KEY }}
          TURN_SECRET: ${{ secrets.TURN_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import base64, hashlib, hmac, os, re, time

          adb_key = os.environ.get("ADB_KEY", "").strip()
          turn_secret = os.environ.get("TURN_KEY", "").strip() or os.environ.get("TURN_SECRET", "").strip()

          if not adb_key:
              raise SystemExit("Error: ADB_KEY secret is not set")
          if not turn_secret:
              raise SystemExit("Error: TURN_KEY (or optional TURN_SECRET alias) is not set")

          # Coturn use-auth-secret expects a REST-style timed username and an HMAC-SHA1 credential.
          # We give the deployed stack a long-lived token so it remains valid between deploys.
          expiry = int(time.time()) + (365 * 24 * 60 * 60)
          turn_username = f"{expiry}:emu"
          turn_credential = base64.b64encode(
              hmac.new(turn_secret.encode("utf-8"), turn_username.encode("utf-8"), hashlib.sha1).digest()
          ).decode("ascii")

          with open("docker-compose.yml", "r") as fh:
              content = fh.read()

          # Capture the leading whitespace so the replacement works at any indentation level.
          # ADB_KEY must be the full PEM key including -----BEGIN/END PRIVATE KEY----- lines.
          def replace_adb_key(match):
              indent = match.group(1)
              return "\n".join(indent + line for line in adb_key.splitlines())

          content = re.sub(r"^( *)PLACEHOLDER_ADB_KEY$", replace_adb_key, content, flags=re.MULTILINE)
          content = content.replace("PLACEHOLDER_TURN_USERNAME", turn_username)
          content = content.replace("PLACEHOLDER_TURN_CREDENTIAL", turn_credential)

          with open("docker-compose.yml", "w") as fh:
              fh.write(content)
          PYEOF

      - name: Upload repository files
        run: |
          rsync -az \
            --exclude='*.md' \
            --exclude='.git/' \
            -e "ssh -i ${SSH_KEY_FILE} -o StrictHostKeyChecking=${SSH_STRICT} -o BatchMode=yes" \
            ./ \
            "${SSH_USER}@${SSH_IP}:${SSH_PATH}/"

      - name: Build Docker images for sub-directories
        run: |
          IMAGE_PREFIX="$(basename "${SSH_PATH}")"
          for dir in frontend apkbridge; do
            ssh -i "${SSH_KEY_FILE}" \
              -o StrictHostKeyChecking="${SSH_STRICT}" \
              -o BatchMode=yes \
              "${SSH_USER}@${SSH_IP}" \
              TARGET="${SSH_PATH}/${dir}" IMAGE_TAG="${IMAGE_PREFIX}-${dir}:latest" \
              bash -l -s <<'REMOTE'
          set -euo pipefail
          if [ ! -d "${TARGET}" ]; then
            echo "    [$(basename "${TARGET}")] Directory not found, skipping."
            exit 0
          fi
          if [ ! -f "${TARGET}/Dockerfile" ]; then
            echo "    [$(basename "${TARGET}")] No Dockerfile found, skipping."
            exit 0
          fi
          echo "    [$(basename "${TARGET}")] Building Docker image ${IMAGE_TAG} ..."
          docker build --no-cache -t "${IMAGE_TAG}" "${TARGET}"
          echo "    [$(basename "${TARGET}")] Build complete."
          REMOTE
          done

      - name: Build docker compose stack
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            COMPOSE_DIR="${SSH_PATH}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          cd "${COMPOSE_DIR}"
          if docker compose version > /dev/null 2>&1; then
            docker compose build
          else
            docker-compose build
          fi
          echo "    docker compose build complete."
          REMOTE

      - name: Deploy docker compose stack
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            COMPOSE_DIR="${SSH_PATH}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          cd "${COMPOSE_DIR}"
          if docker compose version > /dev/null 2>&1; then
            docker compose up -d --remove-orphans
          else
            docker-compose up -d --remove-orphans
          fi
          echo "    docker compose deploy complete."
          REMOTE

      - name: Clean up SSH key
        if: always()
        run: shred -u "${SSH_KEY_FILE}" 2>/dev/null || rm -f "${SSH_KEY_FILE}"
