name: Deploy

on:
  workflow_dispatch:
    inputs:
      build_only:
        description: Build the compose stack on the GitHub runner with dummy secrets and skip remote deploy
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SSH_IP: ${{ secrets.SSH_IP }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PATH: ${{ secrets.SSH_PATH }}
      BUILD_ONLY: ${{ inputs.build_only && 'true' || 'false' }}
      # Prefer API 34, but keep a known-good API 30 fallback for environments
      # where the API 34 manifest is temporarily unavailable.
      EMULATOR_IMAGE_PRIMARY: us-docker.pkg.dev/android-emulator-268719/images/34-google-x64-no-metrics:34.1.18
      EMULATOR_IMAGE_FALLBACK: us-docker.pkg.dev/android-emulator-268719/images/30-google-x64-no-metrics:7148297
      EMULATOR_IMAGE: us-docker.pkg.dev/android-emulator-268719/images/34-google-x64-no-metrics:34.1.19

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key and known_hosts
        if: ${{ !inputs.build_only }}
        env:
          SSH_B64: ${{ secrets.SSH_B64 }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          SSH_KEY_FILE="$(mktemp)"
          printf '%s' "${SSH_B64}" | base64 --decode > "${SSH_KEY_FILE}"
          chmod 600 "${SSH_KEY_FILE}"
          echo "SSH_KEY_FILE=${SSH_KEY_FILE}" >> "$GITHUB_ENV"

          KNOWN_HOSTS_FILE="${HOME}/.ssh/known_hosts"
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          if [[ -n "${SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${SSH_KNOWN_HOSTS}" >> "${KNOWN_HOSTS_FILE}"
            echo "SSH_STRICT=yes" >> "$GITHUB_ENV"
          else
            echo "WARNING: SSH_KNOWN_HOSTS secret is not set; host key verification is disabled." >&2
            echo "SSH_STRICT=no" >> "$GITHUB_ENV"
          fi

      - name: Ensure destination directory exists
        if: ${{ !inputs.build_only }}
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            "mkdir -p '${SSH_PATH}'"

      - name: Check Docker version on remote
        if: ${{ !inputs.build_only }}
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          echo "=== docker version ==="
          docker version || echo "docker version failed"
          echo "=== docker info ==="
          docker info || echo "docker info failed"
          echo "=== compose availability ==="
          docker compose version 2>/dev/null \
            || docker-compose version 2>/dev/null \
            || echo "No compose available"
          REMOTE

      - name: Validate Docker prerequisites on remote
        if: ${{ !inputs.build_only }}
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          if ! command -v docker > /dev/null 2>&1; then
            echo "Docker is not installed on the remote host." >&2
            echo "Install Docker on the target server before running this deploy workflow." >&2
            exit 1
          fi

          if docker compose version > /dev/null 2>&1; then
            docker compose version
            exit 0
          fi

          if docker-compose version > /dev/null 2>&1; then
            docker-compose version
            exit 0
          fi

          echo "Docker Compose is not available on the remote host." >&2
          echo "Install either 'docker compose' or 'docker-compose' on the target server before deploy." >&2
          exit 1
          REMOTE

      - name: Inject secrets into configuration
        env:
          ADB_KEY: ${{ secrets.ADB_KEY }}
          TURN_KEY: ${{ secrets.TURN_KEY }}
          BUILD_ONLY: ${{ env.BUILD_ONLY }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          build_only = os.environ.get("BUILD_ONLY", "").strip().lower() == "true"
          if build_only:
              adb_key = """-----BEGIN PRIVATE KEY-----
              MIIEvQIBADANBgkqhkiG9w0BAQEFAASC
              DUMMY_BUILD_ONLY_DEPLOY_WORKFLOW
              -----END PRIVATE KEY-----"""
              turn_key = "dummy-turn-key-build-only"
          else:
              adb_key = os.environ.get("ADB_KEY", "").strip()
              turn_key = os.environ.get("TURN_KEY", "").strip()

          placeholder_patterns = ("PLACEHOLDER", "REPLACE_ME", "CHANGEME")

          if not adb_key:
              raise SystemExit("Error: ADB_KEY secret is not set")
          if not turn_key:
              raise SystemExit("Error: TURN_KEY secret is not set")
          if turn_key.upper().startswith(placeholder_patterns):
              raise SystemExit("Error: TURN_KEY still looks like a placeholder value")

          # Capture the leading whitespace so the replacement works at any indentation level.
          # ADB_KEY must be the full PEM key including -----BEGIN/END PRIVATE KEY----- lines.
          def replace_adb_key(match):
              indent = match.group(1)
              return "\n".join(indent + line for line in adb_key.splitlines())

          for compose_path in ("docker-compose.yml",):
              if not os.path.exists(compose_path):
                  continue
              with open(compose_path, "r", encoding="utf-8") as fh:
                  content = fh.read()
              content = re.sub(r"^( *)PLACEHOLDER_ADB_KEY$", replace_adb_key, content, flags=re.MULTILINE)
              content = content.replace("PLACEHOLDER_TURN_KEY", turn_key)
              if "PLACEHOLDER_ADB_KEY" in content:
                  raise SystemExit(f"Error: ADB placeholder still present in {compose_path} after injection")
              if "PLACEHOLDER_TURN_KEY" in content:
                  raise SystemExit(f"Error: TURN placeholder still present in {compose_path} after injection")
              with open(compose_path, "w", encoding="utf-8") as fh:
                  fh.write(content)
          PYEOF

      - name: Verify rendered configuration on runner
        run: |
          if grep -R -n "PLACEHOLDER_ADB_KEY\|PLACEHOLDER_TURN_KEY" docker-compose.yml; then
            echo "Rendered configuration still contains placeholders." >&2
            exit 1
          fi

      - name: Upload repository files
        if: ${{ !inputs.build_only }}
        run: |
          rsync -az \
            --exclude='*.md' \
            --exclude='.git/' \
            -e "ssh -i ${SSH_KEY_FILE} -o StrictHostKeyChecking=${SSH_STRICT} -o BatchMode=yes" \
            ./ \
            "${SSH_USER}@${SSH_IP}:${SSH_PATH}/"

      - name: Verify rendered configuration on remote
        if: ${{ !inputs.build_only }}
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            REMOTE_PATH="${SSH_PATH}/docker-compose.yml" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          if grep -n "PLACEHOLDER_ADB_KEY\|PLACEHOLDER_TURN_KEY" "${REMOTE_PATH}"; then
            echo "Remote docker-compose.yml still contains placeholders." >&2
            exit 1
          fi
          echo "Remote docker-compose.yml placeholders cleared."
          REMOTE

      - name: Verify emulator startup wrapper revision on remote
        if: ${{ !inputs.build_only }}
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            REMOTE_ROOT="${SSH_PATH}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          WRAPPER_PATH="${REMOTE_ROOT}/emulator/start-emulator-with-turn.sh"
          if [[ ! -f "${WRAPPER_PATH}" ]]; then
            echo "Missing emulator wrapper on remote: ${WRAPPER_PATH}" >&2
            exit 1
          fi
          echo "Remote wrapper sha256:"
          sha256sum "${WRAPPER_PATH}"
          echo "Remote wrapper diagnostic markers:"
          grep -n "turncfg.runtime.log\|turncfg.generated.json\|\\[turncfg-runtime\\]" "${WRAPPER_PATH}" || {
            echo "Expected TURN diagnostic markers were not found in remote wrapper." >&2
            exit 1
          }
          REMOTE

      - name: Validate emulator base image is resolvable
        if: ${{ !inputs.build_only }}
        run: |
          set -euo pipefail
          resolve_image_on_remote() {
            local candidate="$1"
            ssh -i "${SSH_KEY_FILE}" \
              -o StrictHostKeyChecking="${SSH_STRICT}" \
              -o BatchMode=yes \
              "${SSH_USER}@${SSH_IP}" \
              EMULATOR_IMAGE="${candidate}" \
              bash -l -s <<'REMOTE'
            set -euo pipefail
            for attempt in 1 2 3; do
              if docker manifest inspect "${EMULATOR_IMAGE}" > /dev/null 2>&1; then
                echo "ok"
                exit 0
              fi
              if [[ "${attempt}" -lt 3 ]]; then
                sleep 10
              fi
            done
            echo "fail"
            exit 0
          REMOTE
          }

          selected_image="${EMULATOR_IMAGE_PRIMARY}"
          if [[ "$(resolve_image_on_remote "${EMULATOR_IMAGE_PRIMARY}")" == "ok" ]]; then
            echo "Using primary emulator image: ${EMULATOR_IMAGE_PRIMARY}"
          elif [[ "$(resolve_image_on_remote "${EMULATOR_IMAGE_FALLBACK}")" == "ok" ]]; then
            selected_image="${EMULATOR_IMAGE_FALLBACK}"
            echo "Primary image unavailable; falling back to: ${EMULATOR_IMAGE_FALLBACK}"
          else
            echo "Neither emulator image is resolvable on the remote host." >&2
            echo "Primary:  ${EMULATOR_IMAGE_PRIMARY}" >&2
            echo "Fallback: ${EMULATOR_IMAGE_FALLBACK}" >&2
            exit 1
          fi

          echo "EMULATOR_IMAGE=${selected_image}" >> "$GITHUB_ENV"

      - name: Validate emulator base image on runner
        if: ${{ inputs.build_only }}
        run: |
          set -euo pipefail
          resolve_image_on_runner() {
            local candidate="$1"
            for attempt in 1 2 3; do
              if docker manifest inspect "${candidate}" > /dev/null 2>&1; then
                echo "ok"
                return 0
              fi
              if [[ "${attempt}" -lt 3 ]]; then
                sleep 10
              fi
            done
            echo "fail"
            return 0
          }

          selected_image="${EMULATOR_IMAGE_PRIMARY}"
          if [[ "$(resolve_image_on_runner "${EMULATOR_IMAGE_PRIMARY}")" == "ok" ]]; then
            echo "Using primary emulator image: ${EMULATOR_IMAGE_PRIMARY}"
          elif [[ "$(resolve_image_on_runner "${EMULATOR_IMAGE_FALLBACK}")" == "ok" ]]; then
            selected_image="${EMULATOR_IMAGE_FALLBACK}"
            echo "Primary image unavailable on runner; falling back to: ${EMULATOR_IMAGE_FALLBACK}"
          else
            echo "Neither emulator image is resolvable on the GitHub runner." >&2
            echo "Primary:  ${EMULATOR_IMAGE_PRIMARY}" >&2
            echo "Fallback: ${EMULATOR_IMAGE_FALLBACK}" >&2
            exit 1
          fi

          echo "EMULATOR_IMAGE=${selected_image}" >> "$GITHUB_ENV"

      - name: Build full docker compose stack on runner
        if: ${{ inputs.build_only }}
        run: |
          set -euo pipefail
          docker version
          docker compose version
          for attempt in 1 2 3; do
            if EMULATOR_IMAGE="${EMULATOR_IMAGE}" docker compose build --no-cache; then
              break
            fi

            if [[ "${attempt}" -eq 3 ]]; then
              echo "docker compose build failed after ${attempt} attempts." >&2
              exit 1
            fi

            echo "docker compose build attempt ${attempt} failed; retrying in 15s..." >&2
            sleep 15
          done
          echo "    docker compose builds complete."

      - name: Build full docker compose stack
        if: ${{ !inputs.build_only }}
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            COMPOSE_DIR="${SSH_PATH}" \
            EMULATOR_IMAGE="${EMULATOR_IMAGE}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          cd "${COMPOSE_DIR}"
          for attempt in 1 2 3; do
            if docker compose version > /dev/null 2>&1; then
              if EMULATOR_IMAGE="${EMULATOR_IMAGE}" docker compose build --no-cache; then
                break
              fi
            else
              if EMULATOR_IMAGE="${EMULATOR_IMAGE}" docker-compose build --no-cache; then
                break
              fi
            fi

            if [[ "${attempt}" -eq 3 ]]; then
              echo "docker compose build failed after ${attempt} attempts." >&2
              exit 1
            fi

            echo "docker compose build attempt ${attempt} failed; retrying in 15s..." >&2
            sleep 15
          done
          echo "    docker compose builds complete."
          REMOTE

      - name: Launch full docker compose stack
        if: ${{ !inputs.build_only }}
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            COMPOSE_DIR="${SSH_PATH}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          cd "${COMPOSE_DIR}"
          if docker compose version > /dev/null 2>&1; then
            docker compose up -d --remove-orphans
          else
            docker-compose up -d --remove-orphans
          fi
          echo "    docker compose deploy complete."
          REMOTE

      - name: Verify deployed services
        if: ${{ !inputs.build_only }}
        run: |
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            COMPOSE_DIR="${SSH_PATH}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          cd "${COMPOSE_DIR}"
          if docker compose version > /dev/null 2>&1; then
            docker compose ps
          else
            docker-compose ps
          fi
          REMOTE

      - name: Clean up SSH key
        if: ${{ always() && !inputs.build_only }}
        run: shred -u "${SSH_KEY_FILE}" 2>/dev/null || rm -f "${SSH_KEY_FILE}"
