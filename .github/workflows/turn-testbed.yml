name: TURN Testbed CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  turn-testbed:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      BRIDGE_WRTC_BUILD_FORK: '1'
      TURN_HOST: ${{ vars.TURN_HOST || secrets.TURN_HOST }}
      TURN_KEY: ${{ secrets.TURN_KEY || vars.TURN_KEY }}
      TURN_PORT: ${{ vars.TURN_PORT || '443' }}
      TURN_SCHEME: ${{ vars.TURN_SCHEME || 'turns' }}
      TURN_PROTOCOL: ${{ vars.TURN_PROTOCOL || 'tcp' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux build prerequisites for forked wrtc
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            cmake \
            curl \
            g++ \
            git \
            make \
            ninja-build \
            pkg-config \
            python3 \
            xz-utils

      - name: Validate TURN inputs
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${TURN_HOST:-}" ]]; then
            echo "Error: set repository variable or secret TURN_HOST" >&2
            exit 1
          fi
          if [[ -z "${TURN_KEY:-}" ]]; then
            echo "Error: set repository secret or variable TURN_KEY" >&2
            exit 1
          fi
          if [[ "${TURN_KEY}" =~ PLACEHOLDER|CHANGEME|example|dummy ]]; then
            echo "Error: TURN_KEY appears to be a placeholder" >&2
            exit 1
          fi

      - name: TURN network preflight (DNS/TCP/TLS)
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import socket
          import ssl

          host = os.environ["TURN_HOST"].strip()
          port = int(os.environ.get("TURN_PORT", "443"))
          scheme = os.environ.get("TURN_SCHEME", "turns").strip().lower()

          if not host:
            raise SystemExit("TURN_HOST is empty")

          print(f"[preflight] resolving {host}")
          infos = socket.getaddrinfo(host, port, type=socket.SOCK_STREAM)
          addrs = sorted({info[4][0] for info in infos})
          print(f"[preflight] DNS ok: {', '.join(addrs)}")

          print(f"[preflight] TCP connect to {host}:{port}")
          with socket.create_connection((host, port), timeout=8):
            pass
          print("[preflight] TCP ok")

          if scheme == "turns":
            print(f"[preflight] TLS handshake to {host}:{port}")
            ctx = ssl.create_default_context()
            with socket.create_connection((host, port), timeout=8) as raw:
              with ctx.wrap_socket(raw, server_hostname=host) as tls_sock:
                cert = tls_sock.getpeercert()
            print(f"[preflight] TLS ok; peer subject={cert.get('subject')}")
          else:
            print(f"[preflight] TLS skipped because TURN_SCHEME={scheme}")
          PY

      - name: Run full testbed (includes TURN harness)
        id: testbed
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/testbed.sh

      - name: TURN failure diagnostics (clarify relay-allocation vs reachability)
        id: turn_diagnostics
        if: steps.testbed.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          primary_status="failed"
          diag_3478_status="not-run"
          known_turns_client_limitation="false"

          run_harness_case() {
            local label="$1"
            local scheme="$2"
            local port="$3"
            local logfile="artifacts/turn-harness-${label}.log"

            echo "=== TURN harness case: ${label} (${scheme}:${port}) ==="
            if TURN_SCHEME="${scheme}" TURN_PORT="${port}" node bridge-webrtc/test/turn-connectivity-harness.mjs \
              >"${logfile}" 2>&1; then
              case "${label}" in
                primary) primary_status="passed" ;;
                diag-turn-3478) diag_3478_status="passed" ;;
              esac
            else
              case "${label}" in
                primary) primary_status="failed" ;;
                diag-turn-3478) diag_3478_status="failed" ;;
              esac
            fi
            cat "${logfile}"
            echo
          }

          run_harness_case "primary" "${TURN_SCHEME}" "${TURN_PORT}"

          if [[ "${TURN_SCHEME}" == "turns" ]]; then
            echo "::notice::Primary turns test failed inside testbed. Running plain TURN diagnostic case (turn:3478) to isolate TLS-path vs relay-allocation issues."
            run_harness_case "diag-turn-3478" "turn" "3478"
          fi

          {
            echo "## TURN diagnostic interpretation"
            echo
            echo "- If DNS/TCP/TLS are OK but relay candidates are still zero, this usually indicates TURN auth mismatch or blocked relay connectivity (for this repo: 49160-49200/tcp)."
            echo "- If plain TURN (turn:3478) passes but turns:443 fails after TCP/TLS preflight succeeds, coturn/auth are likely healthy and the failure is more likely in the client turns:/libwebrtc path than in the TURN server itself."
            echo "- If both fail with socket setup/host lookup errors, focus on runner egress/routing and TURN host resolution in the WebRTC client."
            echo
            echo "- Primary harness status: ${primary_status}"
            if [[ "${TURN_SCHEME}" == "turns" ]]; then
              echo "- Plain TURN diagnostic status: ${diag_3478_status}"
            fi
            if [[ "${TURN_SCHEME}" == "turns" && "${primary_status}" == "failed" && "${diag_3478_status}" == "passed" ]]; then
              echo "- Conclusion: plain TURN on 3478 allocated a relay, so shared-secret auth and coturn relay allocation are working. Investigate the emulator/testbed client path for turns:443 rather than treating this as a generic TURN outage."
              known_turns_client_limitation="true"
            fi
            if [[ "${TURN_SCHEME}" == "turns" && "${primary_status}" == "failed" && "${diag_3478_status}" == "failed" ]]; then
              echo "- Conclusion: both turns:443 and turn:3478 failed, so keep focus on runner egress, DNS/routing, TURN auth, or relay reachability."
            fi
            echo
            echo "Primary log: \`artifacts/turn-harness-primary.log\`"
            if [[ "${TURN_SCHEME}" == "turns" ]]; then
              echo "Diagnostic log: \`artifacts/turn-harness-diag-turn-3478.log\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "known_turns_client_limitation=${known_turns_client_limitation}" >> "$GITHUB_OUTPUT"

      - name: Accept known turns client limitation
        if: steps.testbed.outcome == 'failure' && steps.turn_diagnostics.outputs.known_turns_client_limitation == 'true'
        shell: bash
        run: |
          echo "::notice::turn-testbed is treating turns:443 failure as non-fatal because turn:3478 passed and the diagnostics match the known client-side turns:/libwebrtc limitation."

      - name: Upload TURN diagnostic logs
        if: steps.testbed.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          node scripts/capture-ui.mjs artifacts/ui-layout.svg

      - name: Upload TURN diagnostic artifacts
        if: steps.testbed.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: turn-diagnostic-artifacts
          path: |
            artifacts/*.log
            artifacts/ui-layout.svg

      - name: Fail workflow if testbed failed
        if: steps.testbed.outcome == 'failure' && steps.turn_diagnostics.outputs.known_turns_client_limitation != 'true'
        shell: bash
        run: |
          echo "testbed.sh failed. See TURN failure diagnostics and logs above." >&2
          exit 1

  deployed-turns-browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_BASE_URL: http://127.0.0.1:18080
      SSH_B64: ${{ secrets.SSH_B64 }}
      SSH_IP: ${{ secrets.SSH_IP }}
      SSH_PATH: ${{ secrets.SSH_PATH }}
      SSH_USER: ${{ secrets.SSH_USER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deployed browser E2E prerequisites
        id: browser_e2e_gate
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in SSH_B64 SSH_IP SSH_PATH SSH_USER; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("${key}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deployed turns browser E2E because required secrets are missing: ${missing[*]}"
            {
              echo "## Deployed Browser E2E"
              echo
              echo "Skipped because required secrets are missing: \`${missing[*]}\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.browser_e2e_gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        if: steps.browser_e2e_gate.outputs.enabled == 'true'
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.browser_e2e_gate.outputs.enabled == 'true'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Set up SSH key and known_hosts
        if: steps.browser_e2e_gate.outputs.enabled == 'true'
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          SSH_KEY_FILE="$(mktemp)"
          printf '%s' "${SSH_B64}" | base64 --decode > "${SSH_KEY_FILE}"
          chmod 600 "${SSH_KEY_FILE}"
          echo "SSH_KEY_FILE=${SSH_KEY_FILE}" >> "$GITHUB_ENV"

          KNOWN_HOSTS_FILE="${HOME}/.ssh/known_hosts"
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          if [[ -n "${SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "${SSH_KNOWN_HOSTS}" >> "${KNOWN_HOSTS_FILE}"
            echo "SSH_STRICT=yes" >> "$GITHUB_ENV"
          else
            echo "WARNING: SSH_KNOWN_HOSTS secret is not set; host key verification is disabled." >&2
            echo "SSH_STRICT=no" >> "$GITHUB_ENV"
          fi

      - name: Verify deployed emulator stack on remote host
        if: steps.browser_e2e_gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            SSH_PATH="${SSH_PATH}" \
            bash -l -s <<'REMOTE'
          set -euo pipefail
          cd "${SSH_PATH}"
          if docker compose version > /dev/null 2>&1; then
            docker compose ps
          else
            docker-compose ps
          fi
          curl -fsS http://127.0.0.1:18080/ > /dev/null

          for container in google-emu-emulator google-emu-bridge-webrtc; do
            env_dump="$(docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "${container}")"
            printf '%s\n' "${env_dump}" | grep '^TURN_SCHEME=turns$' > /dev/null
            printf '%s\n' "${env_dump}" | grep '^TURN_PORT=443$' > /dev/null
          done
          REMOTE

      - name: Start SSH port forward to deployed frontend
        if: steps.browser_e2e_gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o ExitOnForwardFailure=yes \
            -o BatchMode=yes \
            -f -N \
            -L 18080:127.0.0.1:18080 \
            "${SSH_USER}@${SSH_IP}"

      - name: Wait for forwarded frontend
        if: steps.browser_e2e_gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl -fsS "${E2E_BASE_URL}/" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Forwarded frontend did not become reachable at ${E2E_BASE_URL}" >&2
          exit 1

      - name: Run deployed TURN video browser test
        if: steps.browser_e2e_gate.outputs.enabled == 'true'
        working-directory: frontend
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
        run: npm run test:e2e:deployed-turns

      - name: Collect remote diagnostics
        if: failure() && steps.browser_e2e_gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            SSH_PATH="${SSH_PATH}" \
            bash -l -s <<'REMOTE' > artifacts/remote-compose-ps.txt
          set -euo pipefail
          cd "${SSH_PATH}"
          if docker compose version > /dev/null 2>&1; then
            docker compose ps
          else
            docker-compose ps
          fi
          REMOTE

          ssh -i "${SSH_KEY_FILE}" \
            -o StrictHostKeyChecking="${SSH_STRICT}" \
            -o BatchMode=yes \
            "${SSH_USER}@${SSH_IP}" \
            SSH_PATH="${SSH_PATH}" \
            bash -l -s <<'REMOTE' > artifacts/remote-compose-logs.txt
          set -euo pipefail
          cd "${SSH_PATH}"
          if docker compose version > /dev/null 2>&1; then
            docker compose logs --tail=200 emulator bridge-webrtc envoy frontend apkbridge
          else
            docker-compose logs --tail=200 emulator bridge-webrtc envoy frontend apkbridge
          fi
          REMOTE

      - name: Upload browser test artifacts
        if: always() && steps.browser_e2e_gate.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deployed-turns-video-e2e-artifacts
          path: |
            frontend/test-results/**
            artifacts/*.txt

      - name: Clean up SSH key
        if: always() && steps.browser_e2e_gate.outputs.enabled == 'true'
        shell: bash
        run: shred -u "${SSH_KEY_FILE}" 2>/dev/null || rm -f "${SSH_KEY_FILE}"
