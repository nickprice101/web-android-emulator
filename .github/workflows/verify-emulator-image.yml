name: Verify Emulator Image URLs

on:
  workflow_dispatch:

jobs:
  verify-emulator-image-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify checked-in Google image references resolve
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          files = [
              Path("docker-compose.yml"),
              Path("emulator/Dockerfile"),
              Path(".github/workflows/deploy.yml"),
          ]

          image_pattern = re.compile(
              r"us-docker\.pkg\.dev/android-emulator-268719/images/[A-Za-z0-9._/-]+:[A-Za-z0-9._-]+"
          )

          image_refs = {}
          for file_path in files:
              content = file_path.read_text(encoding="utf-8")
              for image in image_pattern.findall(content):
                  image_refs.setdefault(image, set()).add(str(file_path))

          if not image_refs:
              raise SystemExit("No Google emulator image references were found.")

          def google_manifest_url(image: str) -> str:
              image_no_registry = image.removeprefix("us-docker.pkg.dev/")
              repo, tag = image_no_registry.rsplit(":", 1)
              repo_path, image_name = repo.rsplit("/", 1)
              return f"https://us-docker.pkg.dev/v2/{repo_path}/{image_name}/manifests/{tag}"

          failures = []
          for image, origins in sorted(image_refs.items()):
              url = google_manifest_url(image)
              result = subprocess.run(
                  [
                      "curl",
                      "--silent",
                      "--show-error",
                      "--location",
                      "--head",
                      "--write-out",
                      "\n%{http_code}",
                      "--header",
                      "Accept: application/vnd.docker.distribution.manifest.v2+json",
                      url,
                  ],
                  text=True,
                  capture_output=True,
                  check=False,
              )
              http_code = result.stdout.strip().splitlines()[-1] if result.stdout.strip() else "000"
              print(json.dumps({
                  "image": image,
                  "origins": sorted(origins),
                  "url": url,
                  "http_code": http_code,
              }))
              if http_code != "200":
                  failures.append((image, sorted(origins), url, http_code, result.stderr.strip()))

          if failures:
              lines = ["One or more Google emulator image references did not resolve:"]
              for image, origins, url, http_code, stderr in failures:
                  lines.append(f"- {image} from {', '.join(origins)} -> {http_code} ({url})")
                  if stderr:
                      lines.append(f"  stderr: {stderr}")
              raise SystemExit("\n".join(lines))
          PY
