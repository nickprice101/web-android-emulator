  <text x="58" y="608" fill="#D7DFED" font-family="Segoe UI, Arial, sans-serif" font-size="12">built-in WebRTC service.</text>
  <text x="58" y="626" fill="#9DB0CC" font-family="Segoe UI, Arial, sans-serif" font-size="12">Input is handled through the native</text>
  <text x="58" y="644" fill="#9DB0CC" font-family="Segoe UI, Arial, sans-serif" font-size="12">gRPC/WebRTC client path.</text>
  <rect x="284" y="566" width="180" height="118" rx="12" fill="#09111C" fill-opacity="0.82"/>
  <text x="300" y="590" fill="#D7DFED" font-family="Segoe UI, Arial, sans-serif" font-size="12">mode: native WebRTC active</text>
