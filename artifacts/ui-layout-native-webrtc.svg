  <text x="578" y="642" fill="#A8B3C7" font-family="Segoe UI, Arial, sans-serif" font-size="13">Native WebRTC diagnostics</text>
  <text x="578" y="668" fill="#D7DFED" font-family="Segoe UI, Arial, sans-serif" font-size="12">Transport: emulator gRPC /android.emulation.control.Rtc</text>
  <text x="578" y="688" fill="#D7DFED" font-family="Segoe UI, Arial, sans-serif" font-size="12">Mode: native WebRTC active</text>
  <text x="578" y="708" fill="#D7DFED" font-family="Segoe UI, Arial, sans-serif" font-size="12">Input path: keyboard, mouse, and touch events use the native gRPC/WebRTC client.</text>
  <text x="578" y="728" fill="#D7DFED" font-family="Segoe UI, Arial, sans-serif" font-size="12">Fallbacks: PNG preview remains available, but WebRTC no longer depends on adb screenrecord.</text>
