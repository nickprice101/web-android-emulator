version: "3.8"

services:
  emulator:
    image: us-docker.pkg.dev/android-emulator-268719/images/30-google-x64-no-metrics:30.1.2
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    shm_size: "4gb"
    environment:
      ADBKEY: |
        -----BEGIN PRIVATE KEY-----
        ENTER KEY HERE
        -----END PRIVATE KEY-----
      EMULATOR_PARAMS: "-grpc 8554 -no-snapshot-load -wipe-data -no-audio -partition-size 4096 -feature -Wifi"
      TURN: >-
        {"iceServers":[{"urls":["turns:turn.corsicanescape.com:443?transport=tcp"],"username":"emuuser","credential":"XXX"}]}
    expose:
      - "8554"
      - "5555"
    ports:
      - "15555:5555"
    restart: unless-stopped
    networks:
      google-emu:
        aliases:
          - emulator

  frontend:
    image: google-emu-frontend:latest
    ports:
      - "18081:80"
    restart: unless-stopped
    networks:
      google-emu:
        aliases:
          - frontend

  apkbridge:
    image: google-emu-apkbridge:v5
    environment:
      ADB_TARGET: "emulator:5555"
      WORKSPACE_ROOT: "/workspace"
      DEFAULT_PACKAGE: 
      ADBKEY: |
        -----BEGIN PRIVATE KEY-----
        ENTER KEY HERE
        -----END PRIVATE KEY-----
    volumes:
      - /mnt/user/documents/github:/workspace
    expose:
      - "5000"
    ports:
      - "15000:5000"
    depends_on:
      emulator:
        condition: service_healthy
    # Overwrite the default CMD to run initialization first
    command: >
      bash -c "
      mkdir -p /root/.android &&
      echo \"$$ADBKEY\" > /root/.android/adbkey &&
      chmod 600 /root/.android/adbkey &&
      adb pubkey /root/.android/adbkey > /root/.android/adbkey.pub &&
      echo 'Keys written. Connecting to $$ADB_TARGET...' &&
      adb connect $$ADB_TARGET &&
      sleep 5 &&
      adb -s $$ADB_TARGET wait-for-device &&
      echo 'Connected! Disabling background noise...' &&
      adb -s $$ADB_TARGET shell svc wifi disable || true &&
      adb -s $$ADB_TARGET shell svc data disable || true &&
      echo 'Ready. Starting server...' &&
      gunicorn --chdir /opt/apkbridge -b 0.0.0.0:5000 serverapp:app
      "
    restart: unless-stopped
    networks:
      google-emu:
        aliases:
          - apkbridge

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    depends_on:
      - emulator
      - frontend
      - apkbridge
    ports:
      - "18080:8080"
      - "19901:9901"
    configs:
      - source: envoy_config
        target: /etc/envoy/envoy.yaml
    restart: unless-stopped
    networks:
      google-emu:
        aliases:
          - envoy

configs:
  envoy_config:
    content: |
      static_resources:
        listeners:
          - name: emulator_http
            address:
              socket_address:
                address: 0.0.0.0
                port_value: 8080
            filter_chains:
              - filters:
                  - name: envoy.filters.network.http_connection_manager
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                      codec_type: auto
                      stat_prefix: ingress_http
                      route_config:
                        name: local_route
                        virtual_hosts:
                          - name: emulator_site
                            domains: ["*"]
                            routes:
                              - match:
                                  prefix: "/android.emulation.control.Rtc"
                                route:
                                  cluster: emulator_service_grpc
                                  timeout: 0s
                              - match:
                                  prefix: "/android.emulation.control.EmulatorController"
                                route:
                                  cluster: emulator_service_grpc
                                  timeout: 0s
                              - match:
                                  prefix: "/api/"
                                route:
                                  cluster: apkbridge
                                  prefix_rewrite: "/"
                                  timeout: 0s
                              - match:
                                  prefix: "/"
                                route:
                                  cluster: frontend
                      http_filters:
                        - name: envoy.filters.http.grpc_web
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                        - name: envoy.filters.http.cors
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                        - name: envoy.filters.http.router
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

        clusters:
          - name: emulator_service_grpc
            connect_timeout: 1s
            type: STRICT_DNS
            lb_policy: ROUND_ROBIN
            http2_protocol_options: {}
            load_assignment:
              cluster_name: emulator_service_grpc
              endpoints:
                - lb_endpoints:
                    - endpoint:
                        address:
                          socket_address:
                            address: emulator
                            port_value: 8554

          - name: frontend
            connect_timeout: 1s
            type: STRICT_DNS
            lb_policy: ROUND_ROBIN
            load_assignment:
              cluster_name: frontend
              endpoints:
                - lb_endpoints:
                    - endpoint:
                        address:
                          socket_address:
                            address: frontend
                            port_value: 80

          - name: apkbridge
            connect_timeout: 1s
            type: STRICT_DNS
            lb_policy: ROUND_ROBIN
            load_assignment:
              cluster_name: apkbridge
              endpoints:
                - lb_endpoints:
                    - endpoint:
                        address:
                          socket_address:
                            address: apkbridge
                            port_value: 5000

      admin:
        access_log_path: /tmp/admin_access.log
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 9901

networks:
  google-emu:
    driver: bridge