version: "3.8"

services:
  emulator:
    container_name: google-emu-emulator
    build:
      context: ./emulator
    image: google-emu-emulator:latest
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    shm_size: "4gb"
    environment:
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
      EMULATOR_PARAMS: "-grpc 8554 -no-snapshot-load -wipe-data -no-audio -partition-size 4096 -dns-server 1.1.1.1,8.8.8.8"
      TURN_HOST: "turn.corsicanescape.com"
      TURN_PORT: "443"
      TURN_PROTOCOL: "tcp"
      TURN_SCHEME: "turns"
      TURN_KEY: "PLACEHOLDER_TURN_KEY"
      TURN_TTL: "86400"
      TURN_USERNAME_SUFFIX: "emuuser"
    expose:
      - "8554"
      - "5555"
    ports:
      - "15555:5555"
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - emulator

  frontend:
    container_name: google-emu-frontend
    build:
      context: ./frontend
    image: google-emu-frontend:latest
    expose:
      - "80"
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - frontend

  apkbridge:
    container_name: google-emu-apkbridge
    build:
      context: ./apkbridge
    image: google-emu-apkbridge:latest
    environment:
      ADB_TARGET: "emulator:5555"
      WORKSPACE_ROOT: "/workspace"
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
    volumes:
      - /mnt/user/documents/github:/workspace
    expose:
      - "5000"
    depends_on:
      - emulator
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - apkbridge

  bridge-webrtc:
    container_name: google-emu-bridge-webrtc
    build:
      context: ./bridge-webrtc
    image: google-emu-bridge-webrtc:latest
    environment:
      PORT: "8090"
      CAPTURE_MODE: "adb-screencap"
      CAPTURE_FPS: "6"
      APKBRIDGE_BASE_URL: "http://apkbridge:5000"
      TURN_HOST: "turn.corsicanescape.com"
      TURN_PORT: "443"
      TURN_PROTOCOL: "tcp"
      TURN_SCHEME: "turns"
      TURN_KEY: "PLACEHOLDER_TURN_KEY"
      TURN_TTL: "86400"
      TURN_USERNAME_SUFFIX: "emuuser"
      TURN_BRIDGE_HOST: "192.168.1.152"
      # Set TURN_BRIDGE_HOST to the TURN server's LAN/internal IP when the
      # bridge container cannot reach TURN_HOST directly (e.g. when coturn
      # listens on an internal IP and the router does not support hairpin NAT
      # for the public DNS name).  The bridge will use this host for its own
      # TURN allocation while browsers continue to use TURN_HOST.  Leave unset
      # if the bridge can reach TURN_HOST without issue.
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8090/health').then((r) => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - emulator
      - apkbridge
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - bridge-webrtc

  envoy:
    container_name: google-emu-envoy
    image: envoyproxy/envoy:v1.31-latest
    depends_on:
      - emulator
      - frontend
      - apkbridge
      - bridge-webrtc
    ports:
      - "18080:8080"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - envoy

networks:
  google-emu:
    driver: bridge
