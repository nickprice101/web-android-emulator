version: "3.8"

services:
  emulator:
    image: us-docker.pkg.dev/android-emulator-268719/images/30-google-x64-no-metrics:30.1.2
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    shm_size: "4gb"
    environment:
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
      EMULATOR_PARAMS: "-grpc 8554 -no-snapshot-load -wipe-data -no-audio -partition-size 4096 -dns-server 1.1.1.1,8.8.8.8"
      TURN: >-
        {"iceServers":[{"urls":["turns:turn.corsicanescape.com:443?transport=tcp"],"username":"emuuser","credential":"PLACEHOLDER_TURN_KEY"}]}
    expose:
      - "8554"
      - "5555"
    ports:
      - "15555:5555"
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - emulator

  frontend:
    build:
      context: ./frontend
    image: google-emu-frontend:latest
    ports:
      - "18081:80"
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - frontend

  apkbridge:
    build:
      context: ./apkbridge
    image: google-emu-apkbridge:latest
    environment:
      ADB_TARGET: "emulator:5555"
      WORKSPACE_ROOT: "/workspace"
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
    volumes:
      - /mnt/user/documents/github:/workspace
    expose:
      - "5000"
    ports:
      - "15000:5000"
    depends_on:
      - emulator
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - apkbridge

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    depends_on:
      - emulator
      - frontend
      - apkbridge
    ports:
      - "18080:8080"
      - "19901:9901"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - envoy

networks:
  google-emu:
    driver: bridge
