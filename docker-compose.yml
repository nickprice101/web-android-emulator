version: "3.8"

services:
  emulator:
    container_name: google-emu-emulator
    build:
      context: ./emulator
      args:
        EMULATOR_IMAGE: "${EMULATOR_IMAGE:-us-docker.pkg.dev/android-emulator-268719/images/30-google-x64-no-metrics:7148297}"
        EMULATOR_SYSTEM_IMAGE: "${EMULATOR_SYSTEM_IMAGE:-system-images;android-36;google_apis;x86_64}"
        EMULATOR_PLATFORM: "${EMULATOR_PLATFORM:-platforms;android-36}"
    image: google-emu-emulator:latest
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/dri:/dev/dri
    shm_size: "6gb"
    environment:
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
      EMULATOR_GPU_MODE: "${EMULATOR_GPU_MODE:-swiftshader_indirect}"
      EMULATOR_AVD_READ_ONLY: "${EMULATOR_AVD_READ_ONLY:-1}"
      EMULATOR_SYSTEM_IMAGE: "${EMULATOR_SYSTEM_IMAGE:-system-images;android-36;google_apis;x86_64}"
      EMULATOR_PLATFORM: "${EMULATOR_PLATFORM:-platforms;android-36}"
      EMULATOR_RAM_SIZE_MB: "${EMULATOR_RAM_SIZE_MB:-6144}"
      EMULATOR_PARAMS: "-no-metrics -no-audio -no-snapshot-load -wipe-data -dns-server 1.1.1.1,8.8.8.8 -no-boot-anim -camera-back none -camera-front none -no-snapshot-save"
    expose:
      - "5555"
    ports:
      - "15555:5555"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - emulator

  frontend:
    container_name: google-emu-frontend
    build:
      context: ./frontend
    image: google-emu-frontend:latest
    ports:
      - "18080:80"
    depends_on:
      apkbridge:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - frontend

  apkbridge:
    container_name: google-emu-apkbridge
    build:
      context: ./apkbridge
    image: google-emu-apkbridge:latest
    environment:
      ADB_TARGET: "emulator:5555"
      WORKSPACE_ROOT: "/workspace"
      SCRCPY_MAX_FPS: "${SCRCPY_MAX_FPS:-30}"
      SCRCPY_VIDEO_BIT_RATE: "${SCRCPY_VIDEO_BIT_RATE:-6000000}"
      SCRCPY_MAX_SIZE: "${SCRCPY_MAX_SIZE:-720}"
      SCRCPY_PORT_RANGE: "${SCRCPY_PORT_RANGE:-27183:27283}"
      ADB_INSTALL_ABI: "${ADB_INSTALL_ABI:-auto}"
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
    volumes:
      - /mnt/user/documents/github:/workspace
    expose:
      - "5000"
    depends_on:
      emulator:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5)); sys.exit(0 if data.get('ok') else 1)\"",
        ]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 20
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - apkbridge

networks:
  google-emu:
    driver: bridge
