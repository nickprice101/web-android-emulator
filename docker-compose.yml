version: "3.8"

services:
  emulator:
    container_name: google-emu-emulator
    build:
      context: ./emulator
      args:
        EMULATOR_IMAGE: "${EMULATOR_IMAGE:-us-docker.pkg.dev/android-emulator-268719/images/30-google-x64-no-metrics:7148297}"
        EMULATOR_SYSTEM_IMAGE: "${EMULATOR_SYSTEM_IMAGE:-system-images;android-34;google_apis;x86_64}"
        EMULATOR_PLATFORM: "${EMULATOR_PLATFORM:-platforms;android-34}"
    image: google-emu-emulator:latest
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    shm_size: "4gb"
    environment:
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
      EMULATOR_PARAMS: "-no-audio -grpc 8554 -no-snapshot-load -wipe-data -dns-server 1.1.1.1,8.8.8.8 -gpu swiftshader_indirect -no-boot-anim -camera-back none -camera-front none -no-snapshot-save"
      TURN_HOST: "turn.corsicanescape.com"
      TURN_PORT: "${TURN_PORT:-443}"
      TURN_PROTOCOL: "tcp"
      TURN_SCHEME: "${TURN_SCHEME:-turns}"
      TURN_KEY: "PLACEHOLDER_TURN_KEY"
      TURN_TTL: "2592000"
      TURN_USERNAME_SUFFIX: "emuuser"
    volumes:
      - emu-grpc-token:/run/emu-token
    expose:
      - "8554"
      - "5555"
    ports:
      - "15555:5555"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - emulator

  frontend:
    container_name: google-emu-frontend
    build:
      context: ./frontend
    image: google-emu-frontend:latest
    expose:
      - "80"
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - frontend

  apkbridge:
    container_name: google-emu-apkbridge
    build:
      context: ./apkbridge
    image: google-emu-apkbridge:latest
    environment:
      ADB_TARGET: "emulator:5555"
      WORKSPACE_ROOT: "/workspace"
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
    volumes:
      - /mnt/user/documents/github:/workspace
    expose:
      - "5000"
    depends_on:
      - emulator
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - apkbridge

  bridge-webrtc:
    container_name: google-emu-bridge-webrtc
    build:
      context: ./bridge-webrtc
      args:
        WRTC_FORK_REPO: "${WRTC_FORK_REPO:-https://github.com/nickprice101/node-webrtc.git}"
        WRTC_FORK_REF: "${WRTC_FORK_REF:-00ce1c2340477568d9ca76fd54659b666a69d767}"
    image: google-emu-bridge-webrtc:latest
    environment:
      PORT: "8090"
      CAPTURE_MODE: "${CAPTURE_MODE:-native-rtc}"
      EMULATOR_GRPC_WEB_URL: "http://envoy:8080"
      APKBRIDGE_BASE_URL: "http://apkbridge:5000"
      TURN_HOST: "turn.corsicanescape.com"
      TURN_PORT: "${TURN_PORT:-443}"
      TURN_PROTOCOL: "tcp"
      TURN_SCHEME: "${TURN_SCHEME:-turns}"
      TURN_BRIDGE_HOST: "${TURN_BRIDGE_HOST:-host.docker.internal}"
      TURN_BRIDGE_PORT: "${TURN_BRIDGE_PORT:-3478}"
      TURN_BRIDGE_SCHEME: "${TURN_BRIDGE_SCHEME:-turn}"
      TURN_KEY: "PLACEHOLDER_TURN_KEY"
      TURN_TTL: "2592000"
      TURN_USERNAME_SUFFIX: "emuuser"
      EMULATOR_TOKEN_PATH: "/run/emu-token/emu-grpc-token"
    volumes:
      - emu-grpc-token:/run/emu-token
    expose:
      - "8090"
    depends_on:
      - emulator
      - envoy
      - apkbridge
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - bridge-webrtc

  envoy:
    container_name: google-emu-envoy
    image: envoyproxy/envoy:v1.31-latest
    depends_on:
      - emulator
      - frontend
      - apkbridge
    ports:
      - "18080:8080"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - envoy

networks:
  google-emu:
    driver: bridge

volumes:
  emu-grpc-token:
