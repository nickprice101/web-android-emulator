version: "3.8"

services:
  emulator:
    container_name: google-emu-emulator
    build:
      context: ./emulator
    image: google-emu-emulator:latest
    privileged: true
    devices:
      - /dev/kvm:/dev/kvm
    shm_size: "4gb"
    environment:
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
      EMULATOR_PARAMS: "-grpc 8554 -no-snapshot-load -wipe-data -no-audio -partition-size 4096 -dns-server 1.1.1.1,8.8.8.8"
      TURN_HOST: "turn.corsicanescape.com"
      TURN_PORT: "443"
      TURN_PROTOCOL: "tcp"
      TURN_SCHEME: "turns"
      TURN_KEY: "PLACEHOLDER_TURN_KEY"
      TURN_TTL: "2592000"
      TURN_USERNAME_SUFFIX: "emuuser"
    expose:
      - "8554"
      - "5555"
    ports:
      - "15555:5555"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "adb devices 2>/dev/null | awk 'NR>1 && $2==\"device\" {found=1} END {exit found ? 0 : 1}' && adb -s emulator-5554 shell getprop init.svc.bootanim 2>/dev/null | tr -d '\\r' | grep -q '^stopped$'",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - emulator

  frontend:
    container_name: google-emu-frontend
    build:
      context: ./frontend
    image: google-emu-frontend:latest
    expose:
      - "80"
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - frontend

  apkbridge:
    container_name: google-emu-apkbridge
    build:
      context: ./apkbridge
    image: google-emu-apkbridge:latest
    environment:
      ADB_TARGET: "emulator:5555"
      WORKSPACE_ROOT: "/workspace"
      ADBKEY: |
        PLACEHOLDER_ADB_KEY
    volumes:
      - /mnt/user/documents/github:/workspace
    expose:
      - "5000"
    depends_on:
      emulator:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - apkbridge

  envoy:
    container_name: google-emu-envoy
    image: envoyproxy/envoy:v1.31-latest
    depends_on:
      - emulator
      - frontend
      - apkbridge
    ports:
      - "18080:8080"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      google-emu:
        aliases:
          - envoy

networks:
  google-emu:
    driver: bridge
